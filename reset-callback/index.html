<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caloritre - Sifre Sifirlama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0F1A17;
            color: #E8F5E9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #1a3a2a;
            border-top-color: #10B981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 {
            font-size: 1.5rem;
            color: #10B981;
            margin-bottom: 0.75rem;
        }
        p {
            font-size: 1rem;
            color: #A7F3D0;
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }
        .status {
            font-size: 0.875rem;
            color: #6EE7B7;
            margin-top: 1rem;
        }
        .error {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background: #1a2a22;
            border-radius: 12px;
            border: 1px solid #10B981;
        }
        .error p {
            font-size: 0.9rem;
            color: #D1FAE5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1>Caloritre</h1>
        <p>Sifre sifirlama isleminiz yonlendiriliyor...</p>
        <p class="status" id="status">Uygulama aciliyor...</p>
        <div class="error" id="errorBox">
            <p><strong>Uygulama acilamadi.</strong></p>
            <p>Lutfen Caloritre uygulamasinin yuklu oldugunden emin olun ve baglantiya tekrar tiklayin.</p>
            <p style="margin-top: 0.75rem; font-size: 0.8rem; color: #6EE7B7;">
                Sorun devam ederse uygulamayi acip "Sifremi Unuttum" secenegini tekrar kullanin.
            </p>
        </div>
    </div>

    <script>
        (function() {
            var fragment = window.location.hash;
            var statusEl = document.getElementById('status');
            var errorBox = document.getElementById('errorBox');
            var spinner = document.getElementById('spinner');

            if (!fragment || fragment.length < 2) {
                statusEl.textContent = 'Gecersiz baglanti. Lutfen e-postadaki linke tekrar tiklayin.';
                spinner.style.display = 'none';
                return;
            }

            var customSchemeUrl = 'com.caloritre://reset-callback' + fragment;
            var intentUrl = 'intent://reset-callback' + fragment
                + '#Intent;scheme=com.caloritre;package=com.caloritre.caloritre;end';

            statusEl.textContent = 'Uygulama aciliyor...';

            var iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = customSchemeUrl;
            document.body.appendChild(iframe);

            setTimeout(function() {
                statusEl.textContent = 'Alternatif yontem deneniyor...';
                window.location.href = intentUrl;
            }, 1500);

            setTimeout(function() {
                spinner.style.display = 'none';
                statusEl.textContent = '';
                errorBox.style.display = 'block';
            }, 4000);
        })();
    </script>
</body>
</html>
